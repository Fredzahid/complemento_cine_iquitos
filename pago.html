<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multicine Iquitos | Finalizar Compra</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
                        url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') !important;
            background-size: cover !important;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .pago-container {
            max-width: 480px;
            width: 90%;
            background: rgba(30, 30, 30, 0.95);
            padding: 35px;
            border-radius: 25px;
            border: 1px solid rgba(229, 9, 20, 0.3);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }

        h2 {
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 25px;
            color: #fff;
        }

        .seccion-titulo {
            color: #e50914;
            font-size: 0.85rem;
            font-weight: 800;
            margin: 25px 0 12px 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
        }

        .seccion-titulo::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(229, 9, 20, 0.3);
            margin-left: 10px;
        }

        .detalle-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .detalle-item span:first-child {
            color: #999;
            font-size: 0.9rem;
        }

        .detalle-item span:last-child {
            font-weight: 600;
            color: #fff;
        }

        /* Métodos de Pago */
        .metodos-pago {
            display: grid;
            gap: 12px;
            margin-top: 15px;
        }

        .opcion-pago {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #eee;
        }

        .opcion-pago:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(229, 9, 20, 0.5);
        }

        .opcion-pago.seleccionado {
            border-color: #28a745;
            background: rgba(40, 167, 69, 0.1);
        }

        .btn-pagar {
            width: 100%;
            padding: 18px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.3);
            transition: 0.3s;
        }

        .btn-pagar:hover {
            background: #f40612;
            transform: translateY(-2px);
        }

        .btn-cancelar {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="pago-container">
        <h2>Finalizar Compra</h2>

        <div class="seccion-titulo">Resumen de Reserva</div>
        <div class="detalle-item">
            <span>Película:</span>
            <span id="resumen-pelicula">Super Mario Galaxy</span>
        </div>
        <div class="detalle-item">
            <span>Sala y Asiento:</span>
            <span><span id="resumen-sala">2</span> | <span id="resumen-asiento">B3</span></span>
        </div>
        <div class="detalle-item">
            <span>Horario:</span>
            <span id="resumen-hora">11:18 p. m.</span>
        </div>

        <div class="seccion-titulo">Método de Pago</div>
        <div class="metodos-pago">
            <div class="opcion-pago" onclick="seleccionarMetodo(this, 'Tarjeta')">
                <span>💳</span> Tarjeta Débito/Crédito
            </div>
            <div class="opcion-pago" onclick="seleccionarMetodo(this, 'Yape / Plin')">
                <span>📱</span> Yape / Plin
            </div>
        </div>

        <div class="seccion-titulo">Total a Pagar</div>
        <div style="text-align: center; padding: 15px; background: rgba(229, 9, 20, 0.1); border-radius: 10px; border: 1px dashed rgba(229, 9, 20, 0.5);">
            <span style="font-size: 1.5rem; font-weight: bold; color: #e50914;">S/ 15.00</span>
        </div>

        <button class="btn-pagar" onclick="confirmarPago()">Pagar Ahora</button>
        <a href="index.html" class="btn-cancelar">Cancelar y volver</a>
    </div>

    <script>
        let metodoElegido = "";

        function seleccionarMetodo(elemento, metodo) {
            document.querySelectorAll('.opcion-pago').forEach(el => el.classList.remove('seleccionado'));
            elemento.classList.add('seleccionado');
            metodoElegido = metodo;
        }

        function confirmarPago() {
            if (!metodoElegido) {
                alert("Por favor, selecciona un método de pago.");
                return;
            }

            const ticketFinal = {
                pelicula: document.getElementById('resumen-pelicula').innerText,
                sala: document.getElementById('resumen-sala').innerText,
                asiento: document.getElementById('resumen-asiento').innerText,
                hora: document.getElementById('resumen-hora').innerText,
                pago: metodoElegido,
                total: "S/ 15.00",
                snacks: "No comprados" // Puedes cambiar esto si tienes lógica de snacks
            };

            localStorage.setItem('ticketFinal', JSON.stringify(ticketFinal));
            window.location.href = "confirmacion.html";
        }

        // Cargar datos si existen
        window.onload = () => {
            const data = JSON.parse(localStorage.getItem('reservaActual'));
            if(data) {
                document.getElementById('resumen-pelicula').innerText = data.pelicula;
                document.getElementById('resumen-sala').innerText = data.sala;
                document.getElementById('resumen-asiento').innerText = data.asiento;
                document.getElementById('resumen-hora').innerText = data.hora;
            }
        };
    </script>
</body>
</html>
